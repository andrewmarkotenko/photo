<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Portfolio</title>
</head>
<body>
    <header class="site-header">
        <h1 data-i18n="mainTitle">Portfolio</h1>
        
        <div class="lang-switcher">
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="uk">UA</button>
        </div>
    </header>
    
    <main id="app">
        <nav class="filter-nav">
            <button class="filter-btn" data-category="Headshots" data-i18n="catHeadshots">Headshots</button>
            <button class="filter-btn" data-category="Art" data-i18n="catArt">Art</button>
            <button class="filter-btn" data-category="Lifestyle" data-i18n="catLifestyle">Lifestyle</button>
        </nav>

        <div id="gallery-root" class="masonry-grid"></div>

        <footer class="profile-section">
            <div class="profile-container">
                <div class="profile-about">
                    <h2 data-i18n="aboutTitle">About Me</h2>
                    <p data-i18n="aboutText">Professional photographer based in Canada, specializing in premium headshots, conceptual art, and lifestyle storytelling.</p>
                </div>
                <div class="profile-contact">
                    <h2 data-i18n="contactTitle">Book a Session</h2>
                    <p data-i18n="contactText">Let's discuss your next project or photo session concept.</p>
                    <div class="contact-links">
                        <a href="mailto:your.email@gmail.com" class="contact-link">Email Me</a>
                        <a href="https://instagram.com" target="_blank" rel="noopener" class="contact-link">Instagram</a>
                        <a href="https://wa.me" target="_blank" rel="noopener" class="contact-link">WhatsApp</a>
                    </div>
                </div>
            </div>
        </footer>
    </main>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <button class="lightbox-nav prev">&#10094;</button>
        <img class="lightbox-content" id="lightbox-img" src="" alt="">
        <button class="lightbox-nav next">&#10095;</button>
    </div>

    <script type="module" src="/photo/src/main.js"></script>
</body>
</html>
